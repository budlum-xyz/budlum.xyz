name: Figma verification
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run figma:doctor
      - name: Install OpenFig tooling
        working-directory: tools/design-import
        run: npm ci
      - run: npm run figma:openfig:resolve:check
      - run: npm run figma:openfig:interactions:check
      - run: git diff --exit-code
